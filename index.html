<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidador General de Fuerzas - CENOP</title>
    <style>
        :root {
            --bg-principal: #0b1329;
            --bg-tarjeta: #1c2541;
            --verde-tactico: #00b4d8;
            --texto-claro: #f8fafc;
            --borde: #3a506b;
            --exito: #06d6a0;
            --gris-txt: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            margin: 0;
            padding: 15px;
        }
        .contenedor {
            max-width: 800px;
            margin: 0 auto;
        }
        .titulo-app {
            text-align: center;
            color: var(--texto-claro);
            border-bottom: 2px solid var(--verde-tactico);
            padding-bottom: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .seccion {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h3 {
            color: var(--verde-tactico);
            margin-top: 0;
            text-transform: uppercase;
            border-left: 4px solid var(--verde-tactico);
            padding-left: 10px;
            font-size: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: bold;
            color: var(--gris-txt);
        }
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #0b1329;
            border: 1px solid var(--borde);
            color: var(--texto-claro);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
            font-family: monospace;
        }
        textarea:focus {
            border-color: var(--verde-tactico);
            outline: none;
        }
        button {
            background-color: var(--verde-tactico);
            color: #0b1329;
            border: none;
            padding: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .resultado-reporte {
            background-color: #ffffff;
            border: 2px solid var(--verde-tactico);
            border-left: 6px solid var(--exito);
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            padding: 15px;
            border-radius: 5px;
            color: #000000;
            margin-top: 15px;
            font-size: 15px;
            line-height: 1.4;
        }
        .instrucciones {
            font-size: 12px;
            color: var(--gris-txt);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .filtro-contenedor {
             margin-bottom: 15px;
             padding: 10px;
             background-color: var(--bg-principal);
             border-radius: 5px;
        }
        .filtro-select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background-color: var(--bg-tarjeta);
            color: var(--texto-claro);
            border: 1px solid var(--borde);
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="titulo-app">
        <strong>Consolidador General de Fuerzas</strong>
    </div>

    <div class="seccion">
        <h3>Pegar Reportes de WhatsApp</h3>
        <p class="instrucciones">Pegue los reportes de Granaderos, COR y Tiro Policial. Las listas unificadas se ordenarán automáticamente bajo la estricta jerarquía institucional (CM, SC, IJ, IT, SI, PT).</p>
        
        <div style="margin-bottom: 15px;">
            <label>1. Reporte de GRANADEROS:</label>
            <textarea id="txt-granaderos" rows="4" placeholder="Pegue el texto del reporte de Granaderos aquí..."></textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label>2. Reporte de GRUPO COR:</label>
            <textarea id="txt-cor" rows="4" placeholder="Pegue el texto del reporte de COR aquí..."></textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label>3. Reporte de TIRO POLICIAL:</label>
            <textarea id="txt-tiro" rows="4" placeholder="Pegue el texto del reporte de Tiro Policial aquí..."></textarea>
        </div>

        <button onclick="procesarConsolidado()">Generar Consolidado Jerárquico</button>
    </div>

    <div class="seccion" id="seccion-resultado" style="display: none;">
        <h3>Consolidado General de Instructores</h3>
        <button onclick="copiarConsolidado()" style="background-color: var(--exito); color: #0b1329; margin-bottom: 15px;">Copiar Consolidado para WhatsApp</button>
        
        <!-- Filtro Dinámico -->
        <div class="filtro-contenedor">
             <label for="filtro-novedad">Filtrar vista por novedad:</label>
             <select id="filtro-novedad" class="filtro-select" onchange="aplicarFiltroVista()">
                 <option value="TODAS">-- MOSTRAR TODO EL CONSOLIDADO --</option>
             </select>
        </div>

        <div class="resultado-reporte" id="texto-consolidado-final"></div>
    </div>
</div>

<script>
    const NOVEDADES_LISTA = [
        "FORMACIÓN", "LABORANDO", "RECIBE/OS", "ENTREGA/OS", "RECIBE/SS", "ENTREGA/SS", 
        "RECIBE/S.SEMANA", "ENTREGA/S.SEMANA", "S.SEMANA", "REALIZÓ 1RO 1500", "CLASE AXP", 
        "COMISIÓN SERVICIO", "COMISIÓN ESTUDIO", "COMISIÓN AL EXTERIOR", "CURSO DE ASCENSO", 
        "FRANQUICIA", "DESCANSO DEL SERVICIO", "PERMISO DE ESTUDIO", "PERMISO COMPENSATORIO",
        "PERMISOS ESPECIALES", "PERMISO DILIGENCIA PERSONAL", "CITA MEDICA CENOP", 
        "PERMISO CITA MÉDICA", "EXCUSA PARCIAL", "EXCUSA TOTAL", "LEY MARÍA", "LEY JOSÉ", 
        "VACACIONES", "HOSPITALIZADO", "PERMISO SEMANA SANTA", "PERMISO DICIEMBRE",
        "APOYO AXP PERMANENTE", "APOYO SEGURIDAD", "SEPARACIÓN TEMPORAL", "CONCURSO PATRULLEROS", 
        "LICENCIA DE MATERNIDAD O PATERNIDAD", "LICENCIA NO REMUNERADA", "LICENCIA POR LUTO", 
        "LICENCIA REMUNERADA", "PENDIENTE ACTUALIZAR TRASLADO SIATH", "PENDIENTE POR RETIRAR", 
        "CAPTURADO", "RECIEN TRASLADADO (NO PRESENTADO AL CENOP)", 
        "RECIEN TRASLADADO (PENDIENTE POR PRESENTAR A LA UNIDAD)", "PENDIENTE POR TRAMITE DE REINTEGRO", 
        "SUSPENSIÓN", "RETRASADO"
    ];

    const PESO_JERARQUIA = {
        "CM": 1,
        "SC": 2,
        "IJ": 3,
        "IT": 4,
        "SI": 5,
        "PT": 6
    };

    let textoConsolidadoGlobal = "";

    function obtenerPesoJerarquico(lineaTexto) {
        const textoLimpio = lineaTexto.trim().toUpperCase();
        if (textoLimpio.startsWith("CM")) return PESO_JERARQUIA["CM"];
        if (textoLimpio.startsWith("SC")) return PESO_JERARQUIA["SC"];
        if (textoLimpio.startsWith("IJ")) return PESO_JERARQUIA["IJ"];
        if (textoLimpio.startsWith("IT")) return PESO_JERARQUIA["IT"];
        if (textoLimpio.startsWith("SI")) return PESO_JERARQUIA["SI"];
        if (textoLimpio.startsWith("PT")) return PESO_JERARQUIA["PT"];
        return 99;
    }

    function ordenarPorJerarquia(listaNombres) {
        return listaNombres.sort((a, b) => {
            let pesoA = obtenerPesoJerarquico(a);
            let pesoB = obtenerPesoJerarquico(b);
            if (pesoA !== pesoB) {
                return pesoA - pesoB;
            }
            return a.localeCompare(b);
        });
    }

    function extraerVectores(texto) {
        let efe = [0,0,0,0], dis = [0,0,0,0], nov = [0,0,0,0];
        if (!texto) return { efe, dis, nov };

        const regexEfe = /FUERZA EFE:\s*(\d+)-(\d+)-(\d+)-(\d+)/i;
        const regexDis = /FUERZA DIS:\s*(\d+)-(\d+)-(\d+)-(\d+)/i;
        const regexNov = /NOVEDADES:\s*(\d+)-(\d+)-(\d+)-(\d+)/i;

        let mEfe = texto.match(regexEfe);
        let mDis = texto.match(regexDis);
        let mNov = texto.match(regexNov);

        if(mEfe) efe = [parseInt(mEfe[1]), parseInt(mEfe[2]), parseInt(mEfe[3]), parseInt(mEfe[4])];
        if(mDis) dis = [parseInt(mDis[1]), parseInt(mDis[2]), parseInt(mDis[3]), parseInt(mDis[4])];
        if(mNov) nov = [parseInt(mNov[1]), parseInt(mNov[2]), parseInt(mNov[3]), parseInt(mNov[4])];

        return { efe, dis, nov };
    }

    function extraerConteoNovedad(texto, novedad) {
        let v = [0,0,0,0];
        if (!texto) return v;
        
        let novEscapada = novedad.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        let regex = new RegExp(`^${novEscapada}:\\s*(\\d+)-(\\d+)-(\\d+)-(\\d+)`, "im");
        
        let match = texto.match(regex);
        if (match) {
            v = [parseInt(match[1]), parseInt(match[2]), parseInt(match[3]), parseInt(match[4])];
        }
        return v;
    }

    function extraerListasDeNombres(textoCompleto, listasAcumuladas) {
        if (!textoCompleto) return;
        
        const lineas = textoCompleto.split('\n');
        let novedadActual = null;

        for (let i = 0; i < lineas.length; i++) {
            let linea = lineas[i].trim().toUpperCase();
            if (linea === "" || linea.startsWith("FUERZA") || linea.startsWith("NOVEDADES:") || linea.startsWith("...")) continue;

            let cabeceraEncontrada = false;
            
            if (linea.includes("FORMACION")) {
                novedadActual = "FORMACIÓN";
                cabeceraEncontrada = true;
            } else if (linea.includes("LABORANDO")) {
                novedadActual = "LABORANDO";
                cabeceraEncontrada = true;
            } else {
                for (let nov of NOVEDADES_LISTA) {
                    if (linea === `*${nov}*` || linea === nov) {
                        novedadActual = nov;
                        cabeceraEncontrada = true;
                        break;
                    }
                }
            }

            if (cabeceraEncontrada) continue;

            if (novedadActual && (lineas[i].startsWith(" ") || lineas[i].startsWith("\t") || linea.startsWith("·") || linea.startsWith("-"))) {
                let nombreLimpio = lineas[i].replace(/[·\-\*]/g, "").trim();
                if (nombreLimpio !== "" && !nombreLimpio.startsWith("GRADO") && !nombreLimpio.startsWith("FORMAN") && !nombreLimpio.match(/^\d+-\d+/)) {
                    if (!listasAcumuladas[novedadActual]) {
                        listasAcumuladas[novedadActual] = [];
                    }
                    if (!listasAcumuladas[novedadActual].includes(nombreLimpio)) {
                        listasAcumuladas[novedadActual].push(nombreLimpio);
                    }
                }
            }
        }
    }

    function extraerActividadesLaborando(texto) {
        if (!texto) return "";
        const match = texto.match(/\*ACTIVIDADES\*\s*\n_([^_\n]+)_/i);
        if (match && match[1]) {
            return match[1].trim().toUpperCase();
        }
        return "";
    }

    function procesarConsolidado() {
        const tGran = document.getElementById('txt-granaderos').value;
        const tCor = document.getElementById('txt-cor').value;
        const tTiro = document.getElementById('txt-tiro').value;

        if (!tGran && !tCor && !tTiro) {
            alert("Por favor ingrese al menos uno de los reportes para procesar.");
            return;
        }

        let pGran = extraerVectores(tGran);
        let pCor = extraerVectores(tCor);
        let pTiro = extraerVectores(tTiro);

        let cEfe = [0,0,0,0], cDis = [0,0,0,0], cNov = [0,0,0,0];
        
        for(let i=0; i<4; i++) {
            cEfe[i] = pGran.efe[i] + pCor.efe[i] + pTiro.efe[i];
        }

        let estructuraConteos = {};
        let listasNombresObjetos = {};

        NOVEDADES_LISTA.forEach(nov => {
            estructuraConteos[nov] = [0,0,0,0];
            listasNombresObjetos[nov] = [];
            
            let vG = extraerConteoNovedad(tGran, nov);
            let vC = extraerConteoNovedad(tCor, nov);
            let vT = extraerConteoNovedad(tTiro, nov);
            
            for(let i=0; i<4; i++) {
                estructuraConteos[nov][i] = vG[i] + vC[i] + vT[i];
            }
        });

        extraerListasDeNombres(tGran, listasNombresObjetos);
        extraerListasDeNombres(tCor, listasNombresObjetos);
        extraerListasDeNombres(tTiro, listasNombresObjetos);

        let actGran = extraerActividadesLaborando(tGran);
        let actCor = extraerActividadesLaborando(tCor);
        let actTiro = extraerActividadesLaborando(tTiro);
        let listaActividades = [actGran, actCor, actTiro].filter(a => a !== "").join(" / ");
        if (listaActividades === "") listaActividades = "SIN NOVEDADES EN ACTIVIDADES.";

        NOVEDADES_LISTA.forEach(nov => {
            if (nov !== "FORMACIÓN") {
                for(let i=0; i<4; i++) {
                    cNov[i] += estructuraConteos[nov][i];
                }
            }
        });

        for(let i=0; i<4; i++) {
            cDis[i] = cEfe[i] - cNov[i];
        }

        const fmt = (a) => `${a[0]}-${a[1]}-${a[2]}-${a[3]}= ${a.reduce((x,y)=>x+y,0)}`;
        
        const impListaJerarquica = (arr) => {
            let ordenados = ordenarPorJerarquia(arr);
            return ordenados.map(n => `  ${n}`).join('\n');
        };

        let output = `*CONSOLIDADO GENERAL INSTRUCTORES CENOP*\n\n`;
        output += `FUERZA EFE: ${fmt(cEfe)}\n`;
        output += `FUERZA DIS: ${fmt(cDis)}\n`;
        output += `NOVEDADES: ${fmt(cNov)}\n`;
        output += `.....................\n\n`;

        if (listasNombresObjetos["FORMACIÓN"].length > 0) {
            output += `·  *FORMACION*\n`;
            output += `FORMAN\n${fmt(estructuraConteos["FORMACIÓN"])}\n`;
            output += `  *GRADO* *APELLIDO*\n`;
            output += `${impListaJerarquica(listasNombresObjetos["FORMACIÓN"])}\n\n`;
        }

        if (listasNombresObjetos["LABORANDO"].length > 0) {
            output += `*LABORANDO*\n${fmt(estructuraConteos["LABORANDO"])}\n`;
            output += `*ACTIVIDADES*\n_${listaActividades}_\n`;
            output += `  *GRADO* *APELLIDO*\n`;
            output += `${impListaJerarquica(listasNombresObjetos["LABORANDO"])}\n\n`;
        }

        output += `......................................\n`;
        output += `*NOVEDADES ESPECÍFICAS CON LISTADOS*\n\n`;

        NOVEDADES_LISTA.forEach(nov => {
            if (nov !== "FORMACIÓN" && nov !== "LABORANDO") {
                if (listasNombresObjetos[nov] && listasNombresObjetos[nov].length > 0) {
                    output += `*${nov}*\n${fmt(estructuraConteos[nov])}\n`;
                    output += `  *GRADO* *APELLIDO*\n`;
                    output += `${impListaJerarquica(listasNombresObjetos[nov])}\n\n`;
                }
            }
        });

        output += `..................................\n`;
        output += `Fuerza Efe: ${fmt(cEfe)}\n`;
        output += `Fuerza Dis: ${fmt(cDis)}\n`;
        output += `Novedades ${fmt(cNov)}\n`;
        output += `..................................\n\n`;

        NOVEDADES_LISTA.forEach(nov => {
            let totalEnNov = estructuraConteos[nov].reduce((x,y)=>x+y,0);
            if (totalEnNov > 0) {
                output += `${nov}: ${fmt(estructuraConteos[nov])}\n`;
            }
        });

        output += `\n*“DIOS Y PATRIA”*`;

        textoConsolidadoGlobal = output;
        document.getElementById('texto-consolidado-final').innerText = output;
        document.getElementById('seccion-resultado').style.display = 'block';
        
        llenarFiltroDesplegable();
        
        document.getElementById('seccion-resultado').scrollIntoView({ behavior: 'smooth' });
    }

    function llenarFiltroDesplegable() {
         const select = document.getElementById('filtro-novedad');
         select.innerHTML = '<option value="TODAS">-- MOSTRAR TODO EL CONSOLIDADO --</option>';
         
         if (textoConsolidadoGlobal.includes("FORMACION")) {
             select.innerHTML += `<option value="FORMACION">FORMACION</option>`;
         }
         NOVEDADES_LISTA.forEach(nov => {
             if (textoConsolidadoGlobal.includes(`*${nov}*`)) {
                 select.innerHTML += `<option value="${nov}">${nov}</option>`;
             }
         });
    }

    function aplicarFiltroVista() {
        const filtro = document.getElementById('filtro-novedad').value;
        const divResultado = document.getElementById('texto-consolidado-final');
        
        if (filtro === "TODAS") {
             divResultado.innerText = textoConsolidadoGlobal;
             return;
        }

        let textoMostrar = `Mostrando resultados filtrados para: ${filtro}\n\n`;
        const lineas = textoConsolidadoGlobal.split('\n');
        let capturando = false;
        
        for (let i = 0; i < lineas.length; i++) {
             let linea = lineas[i];
             
             if (linea.includes(`*${filtro}*`) || (linea.includes(`*FORMACION*`) && filtro === "FORMACION")) {
                 capturando = true;
             }
             else if (capturando && (linea.includes("..................................") || (linea.startsWith("*") && !linea.includes(filtro)))) {
                 capturando = false;
                 break;
             }
             
             if (capturando) {
                 textoMostrar += linea + '\n';
             }
        }
        
        if (textoMostrar.trim() === `Mostrando resultados filtrados para: ${filtro}`) {
            textoMostrar += "No se encontraron registros bajo esta categoría en el reporte actual.";
        }
        
        divResultado.innerText = textoMostrar;
    }

    function copiarConsolidado() {
        const elTexto = document.getElementById('texto-consolidado-final').innerText;
        navigator.clipboard.writeText(elTexto).then(() => {
            alert("¡Consolidado copiado con éxito!");
        }).catch(() => {
            alert("Error al copiar el texto automáticamente.");
        });
    }
</script>

</body>
</html>
